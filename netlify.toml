# ============================================================
# netlify.toml — chris-lowe.net
# ============================================================

[build]
  command = "python3 build.py"
  publish = "dist"

# ============================================================
# Simple Analytics Proxy (Bypass ad blockers & protect privacy)
# ============================================================

[[redirects]]
  from = "/api/sa/*"
  to = "https://queue.simpleanalyticscdn.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/sa.js"
  to = "https://simpleanalyticsexternal.com/proxy.js?hostname=chris-lowe.net&path=/api/sa"
  status = 200
  force = true

# ============================================================
# Security & Privacy Headers
# ============================================================

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://scripts.simpleanalyticscdn.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https://img.youtube.com data: https://queue.simpleanalyticscdn.com https://simpleanalyticsbadges.com; connect-src 'self' https://queue.simpleanalyticscdn.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'"

# ============================================================
# Cache headers
# ============================================================

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
